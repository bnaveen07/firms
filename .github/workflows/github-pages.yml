name: Deploy to GitHub Pages

# Deploys the FRIMS frontend as a static site to GitHub Pages.
# The React app is built and uploaded to the gh-pages branch on every push to main.
# You can also trigger this workflow manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./client

      - name: Build production bundle
        run: npm run build
        working-directory: ./client
        env:
          # CI=false prevents build from treating warnings as errors
          CI: false
          # PUBLIC_URL sets the base path for assets when hosted at /firms
          PUBLIC_URL: /firms
          # API and socket point to the backend (update to your deployed backend URL)
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://us-central1-your-project.cloudfunctions.net/api' }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL }}
          # Firebase SDK config (public values — safe to bake into the bundle)
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_VAPID_KEY: ${{ secrets.REACT_APP_FIREBASE_VAPID_KEY }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
