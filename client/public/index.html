    <!--
      GitHub Pages SPA — restore redirect.
      When a page reload on a sub-route is served via the 404.html redirect
      (see public/404.html), the encoded path is in the query string.
      This script restores the original path in the browser History before
      React mounts, so React Router sees the correct URL.

      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
