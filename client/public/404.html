<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FRIMS — Fire Risk Incident Management System</title>
    <!--
      GitHub Pages SPA redirect script.
      When a user navigates directly to a sub-route (e.g. /firms/dashboard),
      GitHub Pages serves this 404.html instead of the React app.
      This script encodes the requested path into the query string and
      redirects to the main index.html, where a complementary script
      restores the original URL using the History API before React mounts.

      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      // Number of path segments to keep from the repo root.
      // For https://bnaveen07.github.io/firms, the base is 1 segment (/firms).
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
